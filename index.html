<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fluxo Minimalista v2</title>
  <style>
    :root {
      --bg: #ffffff; --surface: #f7f6f3; --surface-hover: #efefef;
      --border: #e3e2e0; --text: #37352f; --text-sec: #9b9a97;
      --accent: #2eaadc; --accent-hover: #2488c2; --danger: #eb5757; --star: #f1c40f;
      --completed-bg: #f4f4f3; --shadow: 0 2px 10px rgba(0,0,0,0.06); --shadow-hover: 0 4px 16px rgba(0,0,0,0.1);
      --radius: 8px; --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; display: flex; flex-direction: column; }

    /* HEADER */
    header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 100; gap: 10px; flex-wrap: wrap; }
    .brand { font-weight: 600; font-size: 1.1rem; letter-spacing: -0.5px; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn { padding: 6px 10px; border: 1px solid var(--border); background: var(--surface); border-radius: var(--radius); font-size: 0.85rem; cursor: pointer; transition: all var(--transition); display: flex; align-items: center; gap: 4px; }
    .btn:hover { background: var(--surface-hover); transform: translateY(-1px); }
    .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-hover); }
    .btn.danger { background: #fff5f5; color: var(--danger); border-color: #fcc; }
    .btn.ghost { background: transparent; border: 1px solid transparent; color: var(--text-sec); }
    .btn.ghost:hover { background: var(--surface-hover); color: var(--text); }

    /* FOLDERS */
    .folder-nav { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; border-bottom: 1px solid var(--border); background: var(--bg); scrollbar-width: none; }
    .folder-nav::-webkit-scrollbar { display: none; }
    .folder-tab { padding: 8px 14px; border: 1px solid transparent; border-radius: 20px; background: var(--surface); font-size: 0.9rem; cursor: pointer; transition: all var(--transition); white-space: nowrap; position: relative; }
    .folder-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
    .folder-tab .close { position: absolute; right: -8px; top: -6px; width: 18px; height: 18px; background: var(--danger); color: white; border-radius: 50%; font-size: 12px; display: none; align-items: center; justify-content: center; }
    .folder-tab:hover .close { display: flex; }

    /* CANVAS & CARDS */
    .canvas { flex: 1; position: relative; padding: 20px; overflow-y: auto; background: radial-gradient(circle at 50% 10px, #fcfcfc 0%, #ffffff 100%); }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; max-width: 1200px; margin: 0 auto; padding-bottom: 80px; }
    
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; position: relative; transition: all var(--transition); box-shadow: var(--shadow); cursor: default; transform-origin: center; animation: fadeSlideIn 0.3s ease forwards; }
    .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-3px); }
    .card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
    .card.completed { background: var(--completed-bg); filter: saturate(0.8); }
    .card.completed .card-title { text-decoration: line-through; color: var(--text-sec); }
    
    .drag-handle { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); cursor: grab; padding: 4px; color: var(--text-sec); opacity: 0.5; transition: opacity var(--transition); }
    .drag-handle:hover, .drag-handle:active { opacity: 1; cursor: grabbing; }
    .card.dragging { opacity: 0.6; transform: scale(0.98) rotate(2deg); box-shadow: none; }

    .card-img { width: 100%; height: 110px; object-fit: cover; border-radius: 4px; margin-bottom: 10px; background: #eee; display: none; }
    .card-img.loaded { display: block; animation: fadeIn 0.4s ease; }
    .card-title { font-weight: 500; margin-bottom: 4px; padding-left: 16px; }
    .card-meta { font-size: 0.8rem; color: var(--text-sec); margin-top: 6px; padding-left: 16px; }
    .card-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; opacity: 0; transition: opacity var(--transition); }
    .card:hover .card-actions { opacity: 1; }

    /* ESTRELAS */
    .stars { display: flex; gap: 4px; margin-top: 6px; padding-left: 16px; user-select: none; }
    .star { cursor: pointer; font-size: 1.2rem; color: #ccc; transition: color 0.2s, transform 0.15s; }
    .star.active { color: var(--star); text-shadow: 0 0 2px rgba(241,196,15,0.4); }
    .star:hover { transform: scale(1.15); }
    .card-rating { display: flex; gap: 2px; margin-top: 4px; font-size: 0.85rem; padding-left: 16px; }
    .card-rating .star { pointer-events: none; font-size: 0.9rem; }

    /* SUB-CARDS */
    .subcards-toggle { margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--border); font-size: 0.85rem; color: var(--text-sec); cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .subcards-toggle:hover { color: var(--text); }
    .subcards-list { display: none; margin-top: 8px; animation: fadeSlideIn 0.2s ease; }
    .subcards-list.open { display: block; }
    .subcard { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .subcard-input { width: 100%; padding: 8px; border: 1px solid var(--accent); border-radius: 6px; font-size: 0.85rem; margin-bottom: 6px; background: #faffff; }
    .btn-sub { background: none; border: 1px dashed var(--border); color: var(--text-sec); width: 100%; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: all var(--transition); }
    .btn-sub:hover { border-color: var(--accent); color: var(--accent); background: var(--surface-hover); }
    .btn-del-sub { background: none; border: none; color: var(--text-sec); cursor: pointer; padding: 2px; font-size: 0.9rem; }
    .btn-del-sub:hover { color: var(--danger); }

    /* SVG & FIREWORKS */
    #connections-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    .conn-line { stroke: var(--accent); stroke-width: 2; fill: none; stroke-linecap: round; opacity: 0.6; animation: drawLine 0.4s ease forwards; }
    #fireworks-canvas { position: fixed; inset: 0; z-index: 999; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
    #fireworks-canvas.active { opacity: 1; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity var(--transition); }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 90%; max-width: 480px; box-shadow: var(--shadow-hover); transform: translateY(20px); transition: transform var(--transition); max-height: 90vh; overflow-y: auto; }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h2 { margin-bottom: 16px; font-size: 1.2rem; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--text-sec); margin-bottom: 6px; }
    input, textarea, select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 0.95rem; transition: border var(--transition); }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

    /* UTILS & ANIMATIONS */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-sec); }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: white; padding: 10px 16px; border-radius: 8px; font-size: 0.9rem; opacity: 0; transition: all 0.3s; z-index: 1000; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes drawLine { from { stroke-dasharray: 1000; stroke-dashoffset: 1000; } to { stroke-dasharray: 1000; stroke-dashoffset: 0; } }

    /* MOBILE */
    @media (max-width: 768px) {
      .cards-grid { grid-template-columns: 1fr; padding: 16px; }
      .header { padding: 10px 12px; }
      .btn { padding: 8px 10px; font-size: 0.8rem; }
      .card-actions { opacity: 1; }
      .modal { width: 95%; padding: 18px; }
      .drag-handle { opacity: 0.7; left: 6px; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">📦 Fluxo Minimalista</div>
  <div class="actions">
    <button class="btn primary" id="btn-add-folder">+ Pasta</button>
    <button class="btn" id="btn-add-card">+ Bloco</button>
    <button class="btn" id="btn-toggle-connect">🔗 Conectar</button>
    <button class="btn" id="btn-export">💾 Backup</button>
    <input type="file" id="file-import" accept=".json" hidden>
    <button class="btn" id="btn-import">📥 Importar</button>
  </div>
</header>

<nav class="folder-nav" id="folder-nav"></nav>

<main class="canvas" id="canvas">
  <svg id="connections-svg"></svg>
  <div class="cards-grid" id="cards-container"></div>
</main>

<canvas id="fireworks-canvas"></canvas>
<div class="toast" id="toast"></div>

<!-- MODAL PASTA -->
<div class="modal-overlay" id="modal-folder">
  <div class="modal">
    <h2 id="modal-folder-title">Nova Pasta</h2>
    <div class="form-group">
      <label>Nome da Pasta</label>
      <input type="text" id="inp-folder-name" placeholder="Ex: Ideias, Projetos, Estudos">
    </div>
    <div class="modal-actions">
      <button class="btn" data-close="modal-folder">Cancelar</button>
      <button class="btn primary" id="btn-save-folder">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL CARD -->
<div class="modal-overlay" id="modal-card">
  <div class="modal">
    <h2 id="modal-card-title">Novo Bloco</h2>
    <div class="form-group">
      <label>Título</label>
      <input type="text" id="inp-card-title" placeholder="Ideia principal">
    </div>
    <div class="form-group">
      <label>Descrição / Notas</label>
      <textarea id="inp-card-desc" placeholder="Detalhes, passos, links..."></textarea>
    </div>
    <div class="form-group">
      <label>URL da Imagem (opcional)</label>
      <input type="url" id="inp-card-img" placeholder="https://exemplo.com/imagem.jpg">
      <img id="img-preview" class="card-img" style="height: 80px; margin-top: 6px;">
    </div>
    <div class="form-group">
      <label>Prioridade / Progresso</label>
      <div class="stars" id="modal-stars"></div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" id="btn-delete-card" style="display:none;">Excluir</button>
      <div style="flex:1"></div>
      <button class="btn" data-close="modal-card">Cancelar</button>
      <button class="btn primary" id="btn-save-card">Salvar</button>
    </div>
  </div>
</div>

<script>
  // ESTADO CENTRALIZADO
  const state = {
    folders: [],
    activeFolderId: null,
    connectMode: false,
    selectedCards: [],
    editingCardId: null,
    tempRating: 0,
    dragState: { el: null, idx: -1, startY: 0 }
  };

  const STORAGE_KEY = 'fluxo_v2_data';
  const ARCHIVE_ID = '__archive__';
  const els = {
    folderNav: document.getElementById('folder-nav'),
    cardsContainer: document.getElementById('cards-container'),
    connectionsSvg: document.getElementById('connections-svg'),
    fireworksCanvas: document.getElementById('fireworks-canvas'),
    toast: document.getElementById('toast'),
    modals: { folder: document.getElementById('modal-folder'), card: document.getElementById('modal-card') },
    inputs: {
      folderName: document.getElementById('inp-folder-name'),
      cardTitle: document.getElementById('inp-card-title'),
      cardDesc: document.getElementById('inp-card-desc'),
      cardImg: document.getElementById('inp-card-img')
    },
    previewImg: document.getElementById('img-preview'),
    btnDeleteCard: document.getElementById('btn-delete-card'),
    modalStars: document.getElementById('modal-stars')
  };

  // UTILS
  const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(state.folders));
  const genId = () => crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substr(2, 9);
  const openModal = id => els.modals[id.split('-')[1]].classList.add('open');
  const closeModal = id => els.modals[id.split('-')[1]].classList.remove('open');
  const showToast = msg => { els.toast.textContent = msg; els.toast.classList.add('show'); setTimeout(() => els.toast.classList.remove('show'), 2000); };
  const isArchive = id => id === ARCHIVE_ID;

  // INIT
  function init() {
    const stored = localStorage.getItem(STORAGE_KEY);
    state.folders = stored ? JSON.parse(stored) : [{ id: genId(), name: 'Geral', cards: [] }];
    if (!state.folders.find(f => f.id === ARCHIVE_ID)) {
      state.folders.unshift({ id: ARCHIVE_ID, name: '📦 Arquivados', cards: [] });
    }
    state.activeFolderId = state.folders.find(f => !isArchive(f.id))?.id || state.folders[0].id;
    renderAll();
    setupEvents();
    setupDrag();
  }

  // RENDER
  function renderAll() { renderFolders(); renderCards(); }
  
  function renderFolders() {
    els.folderNav.innerHTML = '';
    state.folders.forEach(f => {
      const el = document.createElement('div');
      el.className = `folder-tab ${f.id === state.activeFolderId ? 'active' : ''}`;
      el.innerHTML = `${f.name} ${!isArchive(f.id) ? `<span class="close" data-del="${f.id}">×</span>` : ''}`;
      el.onclick = (e) => {
        if(e.target.dataset.del) {
          if(confirm('Excluir pasta e todos os blocos?')) {
            state.folders = state.folders.filter(x => x.id !== f.id);
            if(state.activeFolderId === f.id) state.activeFolderId = state.folders.find(f => !isArchive(f.id))?.id || state.folders[0].id;
            save(); renderAll();
          }
          return;
        }
        state.activeFolderId = f.id;
        state.connectMode = false; state.selectedCards = [];
        document.getElementById('btn-toggle-connect').classList.remove('primary');
        renderAll(); setTimeout(drawConnections, 50);
      };
      els.folderNav.appendChild(el);
    });
  }

  function renderCards() {
    const folder = state.folders.find(f => f.id === state.activeFolderId);
    els.cardsContainer.innerHTML = '';
    if(!folder) { els.cardsContainer.innerHTML = '<div class="empty-state">Crie uma pasta primeiro</div>'; return; }
    if(!folder.cards.length) { els.cardsContainer.innerHTML = '<div class="empty-state">Nenhum bloco ainda. Clique em "+ Bloco"</div>'; return; }

    folder.cards.forEach((c, idx) => {
      const card = document.createElement('div');
      card.className = `card ${c.rating === 5 ? 'completed' : ''}`;
      card.dataset.id = c.id;
      card.dataset.idx = idx;
      
      const imgHtml = c.image ? `<img src="${c.image}" class="card-img loaded" onerror="this.style.display='none'">` : '';
      const ratingHtml = c.rating > 0 ? `<div class="card-rating">${renderStarsHTML(5, c.rating, false)}</div>` : '';
      
      card.innerHTML = `
        <div class="drag-handle" title="Arrastar para reordenar">⋮⋮</div>
        ${imgHtml}
        <div class="card-title">${c.title}</div>
        ${ratingHtml}
        <div class="card-meta">${c.desc.slice(0, 70)}${c.desc.length > 70 ? '...' : ''}</div>
        <div class="subcards-toggle" data-toggle="${c.id}">📝 Notas/Raciocínios (${c.subcards?.length || 0}) ▾</div>
        <div class="subcards-list" id="sub-${c.id}">
          <div class="subcards-content"></div>
          <button class="btn-sub" data-addsub="${c.id}">+ Adicionar pensamento</button>
        </div>
        ${!isArchive(folder.id) ? `
        <div class="card-actions">
          <button class="btn" data-edit="${c.id}" style="padding:4px 8px; font-size:0.7rem;">✏️</button>
          <button class="btn danger" data-del="${c.id}" style="padding:4px 8px; font-size:0.7rem;">🗑️</button>
        </div>` : `
        <div class="card-actions">
          <button class="btn ghost" data-unarchive="${c.id}" style="padding:4px 8px; font-size:0.7rem;">♻️ Desarquivar</button>
        </div>`}
      `;

      card.addEventListener('click', (e) => {
        if(e.target.closest('.card-actions') || e.target.closest('.subcards-toggle') || e.target.closest('.btn-sub') || e.target.closest('.btn-del-sub')) return;
        if(state.connectMode && !isArchive(folder.id)) toggleCardSelection(card, c.id);
        else if(!isArchive(folder.id)) openCardModal(c);
      });

      card.querySelector('[data-toggle]')?.addEventListener('click', (e) => {
        e.stopPropagation();
        const list = card.querySelector('.subcards-list');
        list.classList.toggle('open');
        if(list.classList.contains('open')) renderSubcards(c.id, list.querySelector('.subcards-content'));
      });

      card.querySelector('[data-addsub]')?.addEventListener('click', (e) => {
        e.stopPropagation();
        const container = card.querySelector('.subcards-content');
        const inp = document.createElement('input');
        inp.className = 'subcard-input'; inp.placeholder = 'Digite um pensamento...';
        inp.onkeydown = (ev) => {
          if(ev.key === 'Enter' && inp.value.trim()) {
            folder.cards.find(x=>x.id===c.id).subcards.push({ id: genId(), text: inp.value.trim() });
            save(); renderSubcards(c.id, container);
            card.querySelector('[data-toggle]').textContent = `📝 Notas/Raciocínios (${folder.cards.find(x=>x.id===c.id).subcards.length}) ▾`;
          }
        };
        container.appendChild(inp); inp.focus();
      });

      els.cardsContainer.appendChild(card);
    });
    setTimeout(drawConnections, 50);
  }

  function renderStarsHTML(count, active, interactive) {
    let html = '<div class="stars">';
    for(let i=1; i<=count; i++) {
      html += `<span class="star ${i <= active ? 'active' : ''}" ${interactive ? `data-val="${i}"` : ''}>★</span>`;
    }
    return html + '</div>';
  }

  function renderSubcards(cardId, container) {
    const folder = state.folders.find(f=>f.id===state.activeFolderId);
    const card = folder.cards.find(c=>c.id===cardId);
    container.innerHTML = '';
    card.subcards.forEach(sub => {
      const el = document.createElement('div');
      el.className = 'subcard';
      el.innerHTML = `<span>${sub.text}</span><button class="btn-del-sub" data-delsub="${sub.id}" data-parent="${cardId}">×</button>`;
      container.appendChild(el);
    });
  }

  // DRAG & DROP (POINTER EVENTS)
  function setupDrag() {
    const grid = els.cardsContainer;
    let dragEl = null, dragIdx = -1;

    grid.addEventListener('pointerdown', (e) => {
      if(e.target.closest('.drag-handle')) {
        const handle = e.target.closest('.drag-handle');
        dragEl = handle.parentElement;
        dragIdx = parseInt(dragEl.dataset.idx);
        state.dragState = { el: dragEl, idx: dragIdx, startY: e.clientY };
        dragEl.classList.add('dragging');
        dragEl.setPointerCapture(e.pointerId);
      }
    });

    grid.addEventListener('pointermove', (e) => {
      if(!state.dragState.el) return;
      e.preventDefault();
      const afterElement = getDragAfterElement(grid, e.clientY);
      if (afterElement == null) {
        grid.appendChild(state.dragState.el);
      } else {
        grid.insertBefore(state.dragState.el, afterElement);
      }
    });

    grid.addEventListener('pointerup', (e) => {
      if(!state.dragState.el) return;
      const folder = state.folders.find(f => f.id === state.activeFolderId);
      const newOrder = Array.from(grid.querySelectorAll('.card')).map(el => el.dataset.id);
      folder.cards.sort((a, b) => newOrder.indexOf(a.id) - newOrder.indexOf(b.id));
      state.dragState.el.classList.remove('dragging');
      state.dragState.el.releasePointerCapture(e.pointerId);
      state.dragState = { el: null, idx: -1, startY: 0 };
      save(); renderCards();
    });
  }

  function getDragAfterElement(container, y) {
    const draggableElements = [...container.querySelectorAll('.card:not(.dragging)')];
    return draggableElements.reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = y - box.top - box.height / 2;
      if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
      else return closest;
    }, { offset: Number.NEGATIVE_INFINITY }).element;
  }

  // CONEXÕES
  function drawConnections() {
    els.connectionsSvg.innerHTML = '';
    const folder = state.folders.find(f => f.id === state.activeFolderId);
    if(!folder) return;
    const conns = folder.cards.flatMap(c => c.connections || []).filter((v,i,arr) => arr.indexOf(v) === i);
    conns.forEach(pair => {
      const [id1, id2] = pair;
      const el1 = els.cardsContainer.querySelector(`[data-id="${id1}"]`);
      const el2 = els.cardsContainer.querySelector(`[data-id="${id2}"]`);
      if(!el1 || !el2) return;
      const r1 = el1.getBoundingClientRect(), r2 = el2.getBoundingClientRect();
      const c = document.getElementById('canvas').getBoundingClientRect();
      const x1 = r1.left + r1.width/2 - c.left, y1 = r1.top + r1.height/2 - c.top;
      const x2 = r2.left + r2.width/2 - c.left, y2 = r2.top + r2.height/2 - c.top;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${x1},${y1} Q${(x1+x2)/2},${y1} ${x2},${y2}`);
      path.classList.add('conn-line');
      els.connectionsSvg.appendChild(path);
    });
  }

  function toggleCardSelection(el, id) {
    el.classList.toggle('selected');
    const idx = state.selectedCards.indexOf(id);
    if(idx > -1) state.selectedCards.splice(idx, 1);
    else state.selectedCards.push(id);
    
    if(state.selectedCards.length === 2) {
      const folder = state.folders.find(f => f.id === state.activeFolderId);
      const [a,b] = state.selectedCards;
      const ca = folder.cards.find(c=>c.id===a), cb = folder.cards.find(c=>c.id===b);
      if(!ca.connections.includes(b)) { ca.connections.push(b); cb.connections.push(a); }
      state.selectedCards = []; state.connectMode = false;
      document.getElementById('btn-toggle-connect').classList.remove('primary');
      save(); renderCards(); setTimeout(drawConnections, 100);
    }
  }

  // MODALS & FORMS
  function openFolderModal(id = null) {
    state.editingFolderId = id;
    els.inputs.folderName.value = id ? state.folders.find(f=>f.id===id).name : '';
    document.getElementById('modal-folder-title').textContent = id ? 'Editar Pasta' : 'Nova Pasta';
    openModal('modal-folder'); els.inputs.folderName.focus();
  }

  function openCardModal(card = null) {
    state.editingCardId = card?.id || null;
    state.tempRating = card?.rating || 0;
    els.inputs.cardTitle.value = card?.title || '';
    els.inputs.cardDesc.value = card?.desc || '';
    els.inputs.cardImg.value = card?.image || '';
    els.previewImg.src = card?.image || '';
    els.previewImg.style.display = card?.image ? 'block' : 'none';
    document.getElementById('modal-card-title').textContent = card ? 'Editar Bloco' : 'Novo Bloco';
    els.btnDeleteCard.style.display = card ? 'block' : 'none';
    renderModalStars(); openModal('modal-card'); els.inputs.cardTitle.focus();
  }

  function renderModalStars() {
    els.modalStars.innerHTML = '';
    for(let i=1; i<=5; i++) {
      const s = document.createElement('span');
      s.className = `star ${i <= state.tempRating ? 'active' : ''}`; s.textContent = '★'; s.dataset.val = i;
      s.onclick = (e) => { e.stopPropagation(); state.tempRating = i; renderModalStars(); };
      els.modalStars.appendChild(s);
    }
  }

  // ARCHIVE & FIREWORKS LOGIC
  function checkAutoArchive(folder) {
    if(isArchive(folder.id)) return;
    const allCompleted = folder.cards.length > 0 && folder.cards.every(c => c.rating === 5);
    if(allCompleted) {
      showToast('🎉 Todas as metas concluídas! Arquivando...');
      triggerFireworks(() => {
        const archive = state.folders.find(f => f.id === ARCHIVE_ID);
        folder.cards.forEach(c => archive.cards.push({...c}));
        folder.cards = [];
        save(); renderAll(); showToast('✅ Blocos arquivados com sucesso!');
      });
    }
  }

  function triggerFireworks(callback) {
    const canvas = els.fireworksCanvas;
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    canvas.classList.add('active');
    
    const particles = [];
    const centerX = canvas.width / 2, centerY = canvas.height / 2;
    for(let i=0; i<80; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 6;
      particles.push({ x: centerX, y: centerY, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, alpha: 1, color: `hsl(${Math.random()*360}, 80%, 60%)` });
    }

    let frame = 0;
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.alpha -= 0.01;
        ctx.globalAlpha = Math.max(p.alpha, 0);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
      });
      frame++;
      if(frame < 120) requestAnimationFrame(animate);
      else { canvas.classList.remove('active'); callback(); }
    }
    animate();
  }

  // EVENTOS
  function setupEvents() {
    document.getElementById('btn-add-folder').onclick = () => openFolderModal();
    document.getElementById('btn-add-card').onclick = () => openCardModal();
    document.getElementById('btn-toggle-connect').onclick = (e) => {
      state.connectMode = !state.connectMode; state.selectedCards = [];
      e.target.classList.toggle('primary', state.connectMode);
      els.cardsContainer.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    };

    document.querySelectorAll('[data-close]').forEach(btn => btn.onclick = () => closeModal(btn.id));
    document.getElementById('btn-save-folder').onclick = () => {
      const name = els.inputs.folderName.value.trim();
      if(!name) return alert('Nome obrigatório');
      if(state.editingFolderId) {
        state.folders.find(f=>f.id===state.editingFolderId).name = name;
      } else {
        state.folders.push({ id: genId(), name, cards: [] });
        state.activeFolderId = state.folders[state.folders.length-1].id;
      }
      save(); renderFolders(); closeModal('modal-folder');
    };

    document.getElementById('btn-save-card').onclick = () => {
      const title = els.inputs.cardTitle.value.trim();
      if(!title) return alert('Título obrigatório');
      const folder = state.folders.find(f=>f.id===state.activeFolderId);
      const data = { title, desc: els.inputs.cardDesc.value, image: els.inputs.cardImg.value, rating: state.tempRating };
      if(state.editingCardId) {
        const c = folder.cards.find(c=>c.id===state.editingCardId);
        Object.assign(c, data);
      } else {
        folder.cards.push({ id: genId(), connections: [], subcards: [], ...data });
      }
      save(); renderCards(); closeModal('modal-card');
      setTimeout(() => checkAutoArchive(folder), 300);
    };

    els.btnDeleteCard.onclick = () => {
      if(!confirm('Excluir este bloco?')) return;
      const folder = state.folders.find(f=>f.id===state.activeFolderId);
      folder.cards = folder.cards.filter(c=>c.id!==state.editingCardId);
      folder.cards.forEach(c => c.connections = c.connections.filter(id => id!==state.editingCardId));
      save(); renderCards(); closeModal('modal-card');
    };

    els.inputs.cardImg.addEventListener('input', (e) => {
      const url = e.target.value; els.previewImg.src = url; els.previewImg.style.display = url ? 'block' : 'none';
    });

    // Delegação para sub-cards e desarquivar
    els.cardsContainer.addEventListener('click', (e) => {
      if(e.target.closest('.btn-del-sub')) {
        e.stopPropagation();
        const subId = e.target.dataset.delsub, parentId = e.target.dataset.parent;
        const folder = state.folders.find(f=>f.id===state.activeFolderId);
        const card = folder.cards.find(c=>c.id===parentId);
        card.subcards = card.subcards.filter(s=>s.id!==subId);
        save(); renderSubcards(parentId, document.querySelector(`#sub-${parentId} .subcards-content`));
        document.querySelector(`[data-toggle="${parentId}"]`).textContent = `📝 Notas/Raciocínios (${card.subcards.length}) ▾`;
      }
      if(e.target.closest('[data-unarchive]')) {
        e.stopPropagation();
        const id = e.target.dataset.unarchive;
        const archive = state.folders.find(f=>f.id===ARCHIVE_ID);
        const target = state.folders.find(f => !isArchive(f.id)) || state.folders[0];
        const card = archive.cards.find(c=>c.id===id);
        if(card && target) {
          target.cards.push({...card, rating: 5}); // Mantém concluído ou reseta? Mantém 5.
          archive.cards = archive.cards.filter(c=>c.id!==id);
          save(); renderCards(); showToast('♻️ Desencaixado para: '+target.name);
        }
      }
    });

    document.getElementById('btn-export').onclick = () => {
      const blob = new Blob([JSON.stringify(state.folders, null, 2)], {type: 'application/json'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `fluxo-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click(); URL.revokeObjectURL(a.href);
    };
    document.getElementById('btn-import').onclick = () => document.getElementById('file-import').click();
    document.getElementById('file-import').onchange = (e) => {
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if(!Array.isArray(data)) throw new Error('Formato inválido');
          state.folders = data;
          if(!state.folders.find(f=>f.id===ARCHIVE_ID)) state.folders.unshift({ id: ARCHIVE_ID, name: '📦 Arquivados', cards: [] });
          state.activeFolderId = state.folders.find(f => !isArchive(f.id))?.id || state.folders[0].id;
          save(); renderAll(); showToast('📥 Backup importado!');
        } catch(err) { alert('Erro ao importar: ' + err.message); }
      };
      reader.readAsText(file);
    };

    let resizeTimer;
    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(drawConnections, 150); });
  }

  // START
  init();
</script>
</body>
</html>
